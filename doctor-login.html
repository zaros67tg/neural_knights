<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doctor Login — MediQueue</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* Clinical Light Override */
    body { 
      background: #f4f6fc; color: #1a2333; min-height: 100vh; display: flex; flex-direction: column; 
    }
    .bg-damask { display: none; } /* hide dark damask */
    
    .navbar { background: rgba(255,255,255,0.9); border-bottom: 1px solid rgba(0,0,0,0.05); }
    .nav-brand-name { color: #1a2333; }
    
    .login-page {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 100px 20px 40px;
      /* Very subtle clinical background pattern */
      background-image: radial-gradient(#d1d6e3 1px, transparent 1px);
      background-size: 30px 30px;
    }

    /* ── ID CARD CONTAINER (Silver/Blue Clinical theme) ── */
    .id-card-wrap {
      perspective: 1200px;
      width: 100%; max-width: 440px;
    }
    .id-card {
      position: relative;
      background: rgba(255,255,255,0.95); backdrop-filter: blur(20px);
      border-radius: var(--radius-lg);
      padding: 40px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.04);
      overflow: hidden;
    }

    /* Inner silver line */
    .id-card::after {
      content: ''; position: absolute; inset: 10px;
      border: 1px solid rgba(91,155,213,0.3);
      border-radius: calc(var(--radius-lg) - 8px);
      pointer-events: none;
    }

    /* Header strip */
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px; position: relative; z-index: 1;
    }
    .card-hospital-name {
      font-family: 'Playfair Display', serif;
      font-size: 1rem; font-weight: 700; color: #112349;
      line-height: 1.2;
    }
    .card-hospital-name small {
      display: block; font-family: 'Inter', sans-serif;
      font-size: .65rem; font-weight: 600;
      color: #5b9bd5; letter-spacing: 1.5px;
      text-transform: uppercase; margin-top: 4px;
    }
    
    .card-logo-box {
      width: 44px; height: 44px;
      background: rgba(91,155,213,0.1); border: 1px solid rgba(91,155,213,0.3);
      color: #112349;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; flex-shrink: 0;
    }

    /* Divider stripe */
    .card-stripe {
      height: 4px; margin-bottom: 28px;
      background: linear-gradient(90deg, #1a3260, #5b9bd5);
      border-radius: 2px; position: relative; z-index: 1;
    }

    /* Title */
    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.7rem; margin-bottom: 4px; color: #07111f;
      position: relative; z-index: 1;
    }
    .card-subtitle {
      font-size: .85rem; color: #6e7a8f; letter-spacing: .5px;
      margin-bottom: 32px; position: relative; z-index: 1;
    }

    /* Inputs - clinical style */
    .input-label { color: #5b9bd5; }
    .input-field {
      background: #f8fafc; border: 1px solid #d1d9e6; color: #1a2333;
    }
    .input-field:focus { border-color: #5b9bd5; background: #fff; box-shadow: 0 0 0 3px rgba(91,155,213,0.15); }
    .input-field::placeholder { color: #9bb0c9; }
    .input-icon { color: #5b9bd5; }
    
    .btn-clinical {
      background: linear-gradient(135deg, #112349, #1a3260); color: #fff; border: none;
    }
    .btn-clinical:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(17,35,73,0.3); }

    .error-banner {
      background: rgba(224,85,85,.1); border: 1px solid rgba(224,85,85,.3); color: var(--red);
      border-radius: var(--radius-xs); padding: 10px 14px; font-size: .85rem;
      margin-bottom: 16px; display: none;
    }

    .demo-hint { margin-top: 24px; background: #eef2f7; border-radius: var(--radius-sm); padding: 12px; font-size: .8rem; color: #5b6980; text-align: center; }
    .demo-hint code { background: #fff; border: 1px solid #d1d9e6; padding: 2px 6px; border-radius: 4px; color: #112349; font-weight: bold; }

  </style>
</head>
<body>
  <!-- NAVBAR -->
  <nav class="navbar">
    <a class="nav-brand" href="index.html">
      <div class="nav-logo-box" style="background:#112349; color:#fff; border:none;">🏥</div>
      <span class="nav-brand-name">Medi<span style="color:#112349">Queue</span></span>
    </a>
    <div class="nav-right">
      <a href="index.html" class="btn btn-sm" style="color:#5b6980">← Back</a>
      <a href="patient-login.html" class="btn btn-outline btn-sm" style="border-color:#d1d9e6; color:#1a2333;">Patient Login</a>
    </div>
  </nav>

  <main class="login-page">
    <div class="id-card-wrap anim-fadeInUp d-1">
      <div class="id-card">
        <!-- Header -->
        <div class="card-header">
          <div>
            <div class="card-hospital-name">
              MediQueue General Hospital
              <small>Physician Access</small>
            </div>
          </div>
          <div class="card-logo-box">⚕️</div>
        </div>

        <div class="card-stripe"></div>

        <h2 class="card-title">Doctor Sign In</h2>
        <p class="card-subtitle">Secure clinical portal access strictly for hospital staff.</p>

        <!-- ERROR -->
        <div class="error-banner" id="error-banner"></div>

        <!-- FORM -->
        <form class="login-form" id="login-form" onsubmit="handleLogin(event)">
          <div class="input-group" style="margin-bottom:18px;">
            <label class="input-label" for="doc-id">Doctor ID</label>
            <div class="input-wrap">
              <span class="input-icon">👨‍⚕️</span>
              <input id="doc-id" type="text" class="input-field" placeholder="e.g. DOC-001" autocomplete="username" required />
            </div>
          </div>

          <div class="input-group" style="margin-bottom:28px;">
            <label class="input-label" for="password">Password</label>
            <div class="input-wrap">
              <span class="input-icon">🔒</span>
              <input id="password" type="password" class="input-field" placeholder="••••••••" autocomplete="current-password" required />
            </div>
          </div>

          <button type="submit" class="btn btn-clinical btn-full btn-lg" id="login-btn">
            Access Dashboard →
          </button>
        </form>

        <div class="demo-hint">
          Demo: Try ID <code>DOC-001</code> & Password <code>doc</code>
        </div>
      </div>
    </div>
  </main>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script>
    function handleLogin(e) {
      e.preventDefault();
      const id  = document.getElementById('doc-id').value.trim();
      const pwd = document.getElementById('password').value.trim();
      const btn = document.getElementById('login-btn');
      const err = document.getElementById('error-banner');

      btn.textContent = 'Authenticating...'; btn.disabled = true;
      err.style.display = 'none';

      setTimeout(() => {
        const result = AUTH.login('doctor', id, pwd);
        if (result.success) {
          btn.textContent = 'Success ✓';
          setTimeout(() => { window.location.href = 'doctor-dashboard.html'; }, 500);
        } else {
          err.textContent = "Invalid Doctor ID or password. (Unauthorized)";
          err.style.display = 'block';
          btn.textContent = 'Access Dashboard →'; btn.disabled = false;
        }
      }, 600);
    }
  </script>
</body>
</html>
