<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Problem Desk — AI Triage</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { padding-top: 68px; display: flex; flex-direction: column; min-height: 100vh; transition: background 0.6s ease; }
    
    /* Dynamic background transitions based on urgency */
    body.bg-blue { background: radial-gradient(circle at top, rgba(91,155,213,0.1), var(--navy-800) 50%); }
    body.bg-amber { background: radial-gradient(circle at top, rgba(240,160,48,0.15), var(--navy-800) 60%); }
    body.bg-red { background: radial-gradient(circle at top, rgba(224,85,85,0.2), var(--navy-800) 70%); }

    .desk-container {
      max-width: 720px; width: 100%; margin: 60px auto;
      padding: 40px; position: relative; z-index: 1;
    }

    .header-icon { font-size: 3rem; margin-bottom: 20px; line-height: 1; }
    
    /* Clean "Chat-like" form */
    .form-pane {
      background: rgba(10,22,40,0.85); backdrop-filter: blur(20px);
      border: 1px solid rgba(201,147,58,0.15); border-radius: var(--radius-lg);
      padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      transition: border-color 0.4s ease, box-shadow 0.4s ease;
    }

    .form-pane.pane-amber { border-color: rgba(240,160,48,0.5); box-shadow: 0 0 40px rgba(240,160,48,0.15); }
    .form-pane.pane-red { border-color: rgba(224,85,85,0.6); box-shadow: 0 0 60px rgba(224,85,85,0.25); }

    .chat-input-wrap { margin-bottom: 30px; }
    .chat-label { font-size: .95rem; color: var(--text-soft); font-weight: 500; margin-bottom: 12px; display: block; }
    .chat-textarea {
      width: 100%; min-height: 120px;
      background: rgba(0,0,0,0.3); border: none; border-left: 2px solid var(--gold);
      color: var(--text); padding: 16px; font-size: 1.05rem; outline: none; resize: none;
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    }
    .chat-textarea:focus { background: rgba(0,0,0,0.4); }

    .metrics-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }

    /* Emergency Checkboxes */
    .emergency-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .em-checkbox {
      display: flex; align-items: center; gap: 12px; padding: 12px 16px;
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-sm); cursor: pointer; transition: all 0.2s ease;
      font-size: .9rem; color: var(--text-soft);
    }
    .em-checkbox input { display: none; }
    .em-checkbox.checked { background: rgba(224,85,85,0.1); border-color: rgba(224,85,85,0.4); color: var(--red); font-weight: 600; }

    /* Scan animation */
    .scan-overlay {
      position: absolute; inset: 0; background: rgba(4,9,15,0.9); backdrop-filter: blur(8px);
      border-radius: var(--radius-lg); z-index: 10; display: none; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
    }
    .scan-line {
      width: 100%; height: 2px; background: var(--gold); box-shadow: 0 0 15px var(--gold);
      position: absolute; top: 0; animation: scanAnim 1.5s linear infinite;
    }
    @keyframes scanAnim {
      0% { top: 0; opacity: 0; }
      10% { top: 0; opacity: 1; }
      90% { top: 100%; opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }

    /* Output Results Modal */
    .ai-result-panel { background: var(--navy-700); padding: 30px; border-radius: var(--radius-md); }
    .ai-urgent-badge {
      display: inline-block; padding: 6px 12px; border-radius: var(--radius-xs);
      font-weight: 700; font-size: .85rem; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 16px;
    }
    .cond-list { list-style: none; padding: 0; margin: 16px 0; }
    .cond-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .cond-item span:last-child { color: var(--gold); font-weight: 700; }
    .ai-advice { background: rgba(255,255,255,0.03); padding: 16px; border-left: 3px solid var(--blue); margin-bottom: 24px; font-size: .85rem; }

  </style>
</head>
<body class="bg-blue" id="body-bg">
  <div id="toast-container"></div>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a class="nav-brand" href="index.html">
      <div class="nav-logo-box">🏥</div>
      <span class="nav-brand-name">Medi<span>Queue</span></span>
    </a>
    <div class="nav-right" id="nav-right">
      <a href="patient-dashboard.html" class="btn btn-ghost btn-sm">← Back</a>
    </div>
  </nav>

  <div class="desk-container anim-fadeInUp">
    <div class="header-icon anim-float">🧠</div>
    <h1 style="font-family:'Playfair Display',serif; font-size: 2.2rem; margin-bottom: 8px;">The Problem Desk</h1>
    <p style="color:var(--text-soft); margin-bottom: 30px;">Describe your symptoms. Our Triage AI will analyze your condition and route you to the correct department instantly.</p>

    <div class="form-pane" id="form-pane">
      
      <!-- Loading Overlay -->
      <div class="scan-overlay" id="scan-overlay">
        <div class="scan-line"></div>
        <div class="spinner" style="margin-bottom:16px;"></div>
        <h3 class="text-gold" style="font-family:'Inter',serif;">AI Analyzing Symptoms...</h3>
        <p style="color:var(--text-muted); font-size:.85rem; margin-top:8px;">Running classification models</p>
      </div>

      <div class="chat-input-wrap">
        <label class="chat-label">In your own words, what are you feeling right now?</label>
        <textarea class="chat-textarea" id="input-symptoms" placeholder="e.g. I have had a severe throbbing headache since morning with some nausea..."></textarea>
      </div>

      <div class="metrics-row">
        <div>
          <label class="chat-label">Body Temp (°F)</label>
          <input type="number" id="input-temp" class="input-field no-icon" placeholder="e.g. 98.6" value="98.6" step="0.1">
        </div>
        <div>
          <label class="chat-label">Duration</label>
          <select id="input-duration" class="input-field no-icon">
            <option>Just started</option>
            <option>Few hours</option>
            <option>1-3 Days</option>
            <option>Over a week</option>
          </select>
        </div>
      </div>

      <label class="chat-label">Do you have any of these emergency indicators?</label>
      <div class="emergency-grid" style="margin-bottom: 30px;">
        <label class="em-checkbox" onclick="calcUrgency()">
          <input type="checkbox" value="severe" class="em-box" data-score="3"> 🚨 Severe Pain
        </label>
        <label class="em-checkbox" onclick="calcUrgency()">
          <input type="checkbox" value="chest" class="em-box" data-score="5"> ❤️‍🩹 Chest Pain / Pressure
        </label>
        <label class="em-checkbox" onclick="calcUrgency()">
          <input type="checkbox" value="breathing" class="em-box" data-score="5"> 🫁 Diffculty Breathing
        </label>
        <label class="em-checkbox" onclick="calcUrgency()">
          <input type="checkbox" value="bleeding" class="em-box" data-score="4"> 🩸 Heavy Bleeding
        </label>
        <label class="em-checkbox" onclick="calcUrgency()">
          <input type="checkbox" value="consciousness" class="em-box" data-score="5"> 🧠 Fainting / Confusion
        </label>
        <label class="em-checkbox" onclick="calcUrgency()">
          <input type="checkbox" value="vision" class="em-box" data-score="3"> 👁️ Sudden Vision Loss
        </label>
      </div>

      <button class="btn btn-gold btn-full btn-lg" onclick="analyzeSymptoms()">Analyze & Route Me →</button>
    </div>
  </div>

  <!-- AI Results Modal -->
  <div class="modal-backdrop" id="ai-modal">
    <div class="modal" style="max-width: 600px;">
      <div class="modal-header">
        <h3 class="modal-title">Analysis Complete</h3>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>

      <div class="ai-result-panel" id="ai-results">
        <!-- Rendered by JS -->
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/data.js"></script>
  <script>
    // Security check
    const user = AUTH.requireAuth('patient');
    if(user) {
      document.getElementById('nav-right').innerHTML = `
        <span class="text-soft" style="font-size:.85rem">${user.name}</span>
        <button class="btn btn-ghost btn-sm" onclick="AUTH.logout()">Sign Out</button>
        <a href="patient-dashboard.html" class="btn btn-outline btn-sm">My Health</a>
      `;
    }

    // Dynamic color shifting logic
    function calcUrgency() {
      let score = 0;
      const boxes = document.querySelectorAll('.em-box');
      boxes.forEach(b => {
        b.parentElement.classList.toggle('checked', b.checked);
        if(b.checked) score += parseInt(b.dataset.score);
      });

      const body = document.getElementById('body-bg');
      const pane = document.getElementById('form-pane');
      
      body.className = '';
      pane.className = 'form-pane';

      if (score >= 5) {
        body.classList.add('bg-red');
        pane.classList.add('pane-red');
      } else if (score > 0) {
        body.classList.add('bg-amber');
        pane.classList.add('pane-amber');
      } else {
        body.classList.add('bg-blue');
      }
    }

    // AI Classification Mock Simulation
    function analyzeSymptoms() {
      const symp = document.getElementById('input-symptoms').value.toLowerCase();
      if(symp.trim() === '') {
        alert("Please describe your symptoms.");
        return;
      }

      // Check urgency score
      let score = 0;
      document.querySelectorAll('.em-box:checked').forEach(b => score += parseInt(b.dataset.score));

      // Trigger animation
      document.getElementById('scan-overlay').style.display = 'flex';

      setTimeout(() => {
        document.getElementById('scan-overlay').style.display = 'none';
        
        let urgency = { level: 'Low', color: 'green', text: 'Routine Checkup' };
        if (score >= 5) urgency = { level: 'High', color: 'red', text: 'Immediate Attention Required' };
        else if (score > 0 || symp.includes('fever')) urgency = { level: 'Medium', color: 'amber', text: 'Urgent Care' };

        // Simple mock matching
        let dept = "General Medicine";
        let conds = [];
        
        if (symp.includes('chest') || symp.includes('heart')) {
          dept = "Cardiology";
          conds = [ {n: 'Angina', c: 82}, {n: 'Myocardial Infarction', c: 45}, {n: 'Acid Reflux', c: 30} ];
        } else if (symp.includes('headache') || symp.includes('vision') || symp.includes('confus')) {
          dept = "Neurology";
          conds = [ {n: 'Migraine', c: 88}, {n: 'Tension Headache', c: 65}, {n: 'TIA', c: 22} ];
        } else if (symp.includes('bone') || symp.includes('pain') || symp.includes('fracture')) {
          dept = "Orthopedics";
          conds = [ {n: 'Muscle Strain', c: 75}, {n: 'Hairline Fracture', c: 55}, {n: 'Ligament Sprain', c: 40} ];
        } else if (symp.includes('skin') || symp.includes('rash') || symp.includes('itch')) {
          dept = "Dermatology";
          conds = [ {n: 'Contact Dermatitis', c: 80}, {n: 'Urticaria', c: 60}, {n: 'Eczema Flare', c: 45} ];
        } else {
          conds = [ {n: 'Viral Infection', c: 78}, {n: 'Bacterial Infection', c: 55}, {n: 'Fatigue', c: 35} ];
        }

        renderAIResults(urgency, dept, conds, symp);
      }, 2500); // simulated processing time
    }

    function renderAIResults(urgency, dept, conds, rawSymp) {
      // Store in localStorage to pass to doctor-select page
      localStorage.setItem('mq_triage_symptoms', rawSymp);
      localStorage.setItem('mq_triage_dept', dept);

      const html = `
        <div class="ai-urgent-badge" style="background: rgba(var(--${urgency.color}-rgb, 255,255,255), 0.15); color: var(--${urgency.color}); border: 1px solid var(--${urgency.color});">
          ${urgency.level} Priority — ${urgency.text}
        </div>

        <h4 style="margin-bottom: 8px;">Top 3 Predicted Conditions:</h4>
        <ul class="cond-list">
          ${conds.map(c => `<li class="cond-item"><span>${c.n}</span> <span>${c.c}% Match</span></li>`).join('')}
        </ul>

        <div class="ai-advice">
          <strong style="color:var(--blue)">Temporary Precautionary Advice:</strong><br>
          ${urgency.level === 'High' ? 'Do not drive yourself. Have someone bring you immediately or call an ambulance. Do not consume heavy meals.' : 
            'Rest quietly. Stay hydrated. Do not take unauthorized strong painkillers before consultation.'}
        </div>

        <h4 style="margin-bottom: 12px;">Recommended Action:</h4>
        <div style="display:flex; align-items:center; justify-content:space-between; background: rgba(0,0,0,0.3); padding: 16px; border-radius: var(--radius-sm); margin-bottom:20px;">
          <div>Consult a <strong>${dept}</strong> Specialist</div>
          <button class="btn btn-gold btn-sm" onclick="window.location.href='doctor-select.html'">Book ${dept} →</button>
        </div>
      `;

      document.getElementById('ai-results').innerHTML = html;
      document.getElementById('ai-modal').classList.add('open');
    }

    function closeModal() { document.getElementById('ai-modal').classList.remove('open'); }
  </script>
</body>
</html>
